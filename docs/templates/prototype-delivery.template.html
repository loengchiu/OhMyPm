<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{页面标题}}</title>
  <link rel="stylesheet" href="prototype-shared.css">
</head>
<body>
  <aside class="outline-panel" id="outlinePanel">
    <button class="outline-toggle" id="outlineToggle" type="button" aria-label="切换页面大纲">≡</button>
    <div class="outline-inner">
      <h2 class="outline-title">{{需求名称}}</h2>
      <p class="outline-text">主流程：{{主流程摘要}}</p>
      <div class="outline-list">
        <a class="outline-link" href="{{页面一链接}}"><div class="outline-item"><strong>1. 页面列表 / {{页面一名称}}</strong><span>{{页面一用途}}</span></div></a>
        <a class="outline-link" href="{{页面二链接}}"><div class="outline-item"><strong>{{页面二名称}}</strong><span>{{页面二用途}}</span></div></a>
        <a class="outline-link" href="{{页面三链接}}"><div class="outline-item"><strong>{{页面三名称}}</strong><span>{{页面三用途}}</span></div></a>
        <a class="outline-link" href="{{页面四链接}}"><div class="outline-item"><strong>{{页面四名称}}</strong><span>{{页面四用途}}</span></div></a>
      </div>
    </div>
  </aside>

  <div class="shell">
    <section class="page-block">
      <div class="canvas">
        {{页面主体HTML}}
      </div>
    </section>
  </div>

  <div class="note-layer">
    {{标记浮窗HTML}}
  </div>

  <script src="prototype-shared.js"></script>
</body>
</html>
